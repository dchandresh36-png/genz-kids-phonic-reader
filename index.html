<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenZ Kids Phonic Reader</title>
    <style>
        /* Your original game styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .game-container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .word-box h1 {
            font-size: 4rem;
            color: #333;
            margin-bottom: 30px;
            letter-spacing: 5px;
        }
        .choices-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .choice-btn {
            font-size: 2rem;
            padding: 15px 30px;
            border: 3px solid #008cba;
            background-color: white;
            color: #008cba;
            border-radius: 10px;
            cursor: pointer;
            min-width: 100px;
            transition: all 0.2s ease;
        }
        .choice-btn.correct {
            background-color: #4caf50;
            color: white;
            border-color: #4caf50;
        }
        .choice-btn.incorrect {
            background-color: #f44336;
            color: white;
            border-color: #f44336;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="word-box">
            <h1 id="word-display">START</h1>
        </div>

        <div class="choices-container">
            <button class="choice-btn" id="btn-0"></button>
            <button class="choice-btn" id="btn-1"></button>
            <button class="choice-btn" id="btn-2"></button>
        </div>
    </div>

    <script>
        // Game Data
        const phonicsData = [
            { word: "CAT", choices: ["A", "CAT", "D"] },
            { word: "DOG", choices: ["DOG", "O", "G"] },
            { word: "SUN", choices: ["S", "U", "SUN"] },
            { word: "BALL", choices: ["B", "BALL", "L"] },
            { word: "BAT", choices: ["BAT", "A", "T"] }
        ];

        let currentQuestionIndex = 0;
        let isVoiceEngineUnlocked = false;

        function speakWord(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                
                // Normal plain reading settings
                utterance.rate = 1.0;  
                utterance.pitch = 1.0; 
                utterance.volume = 1.0; 

                window.speechSynthesis.speak(utterance);
            }
        }

        function forceUnlockMobileAudio() {
            if (!isVoiceEngineUnlocked) {
                const silentSpeech = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(silentSpeech);
                isVoiceEngineUnlocked = true;
            }
        }

        function loadQuestion() {
            const currentData = phonicsData[currentQuestionIndex];
            document.getElementById('word-display').textContent = currentData.word;
            
            for (let i = 0; i < 3; i++) {
                const button = document.getElementById(`btn-${i}`);
                if (button) {
                    button.textContent = currentData.choices[i];
                    button.className = "choice-btn"; 
                }
            }

            // Just says the simple text like the original code did
            speakWord(currentData.word);
        }

        function handleChoiceClick(index) {
            forceUnlockMobileAudio();

            const currentData = phonicsData[currentQuestionIndex];
            const selectedButton = document.getElementById(`btn-${index}`);
            const choiceText = selectedButton.textContent;

            if (choiceText === currentData.word) {
                selectedButton.classList.add('correct');
                speakWord("Correct");

                setTimeout(() => {
                    currentQuestionIndex++;
                    if (currentQuestionIndex < phonicsData.length) {
                        loadQuestion();
                    } else {
                        currentQuestionIndex = 0;
                        loadQuestion();
                    }
                }, 1500);
            } else {
                selectedButton.classList.add('incorrect');
                speakWord("Wrong");
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            for (let i = 0; i < 3; i++) {
                const button = document.getElementById(`btn-${i}`);
                if (button) {
                    button.addEventListener('click', () => handleChoiceClick(i));
                }
            }
            loadQuestion();
        });
    </script>
</body>
</html>
